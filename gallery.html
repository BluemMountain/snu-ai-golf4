<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Round Logs | SNU AI Golf Club</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700&family=Noto+Sans+KR:wght@300;400;500;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap"
        rel="stylesheet">
    <!-- CSS -->
    <link rel="stylesheet" href="style.css?v=4.2">
    <link rel="stylesheet" href="gallery_magazine.css?v=1.1">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body class="magazine-body">
    <!-- Magazine Header -->
    <header class="magazine-header">
        <div class="header-top">
            <a href="index.html" class="magazine-back-link"><i class="fas fa-long-arrow-alt-left"></i> BACK TO HOME</a>
            <div class="magazine-brand">SNU AI GOLF CLUB</div>
            <div class="magazine-meta">ISSUE 2026.02</div>
        </div>
        <div class="magazine-title-container">
            <h1 class="magazine-title">Round Log</h1>
            <p class="magazine-subtitle">Premium Memories on the Green</p>
        </div>
    </header>

    <main class="magazine-container">
        <!-- Masonry Grid -->
        <div id="round-logs-grid" class="masonry-grid">
            <!-- Content will be dynamically loaded via gallery_logic.js -->
            <div class="magazine-loader">
                <div class="magazine-spinner"></div>
                <p>Loading Editorial Content...</p>
            </div>
        </div>
    </main>

    <!-- Upload Button (Floating) -->
    <button class="magazine-record-btn" id="open-upload-btn">
        <span class="btn-icon"><i class="fas fa-pen-nib"></i></span>
        <span class="btn-text">기록하기</span>
    </button>

    <!-- Upload Modal -->
    <div id="upload-modal" class="magazine-modal">
        <div class="magazine-modal-content">
            <span class="magazine-modal-close">&times;</span>
            <div class="modal-magazine-header">
                <h2>New Entry</h2>
                <div class="modal-line"></div>
            </div>

            <form id="round-log-form">
                <input type="hidden" id="log-edit-id" name="id">
                <div class="magazine-form-grid">
                    <div class="form-group-mag">
                        <label for="log-date">Date</label>
                        <input type="text" id="log-date" name="date" required placeholder="2026.02.17">
                    </div>
                    <div class="form-group-mag">
                        <label for="log-location">Location</label>
                        <input type="text" id="log-location" name="location" required placeholder="신원CC">
                    </div>
                    <div class="form-group-mag full-width">
                        <label for="log-quote">A Line of the Day</label>
                        <input type="text" id="log-quote" name="quote" required placeholder="소중한 원우님들과 함께한 최고의 라운딩">
                    </div>
                    <div class="form-group-mag">
                        <label for="log-companions">Companions</label>
                        <input type="text" id="log-companions" name="companions" placeholder="홍길동, 김철수, 이영희">
                    </div>
                    <div class="form-group-mag">
                        <label for="log-weather">Weather</label>
                        <input type="text" id="log-weather" name="weather" placeholder="맑음, 바람 다소">
                    </div>
                    <div class="form-group-mag full-width">
                        <label for="log-name">Submitter</label>
                        <input type="text" id="log-name" name="user_name" required placeholder="본인 성함">
                    </div>
                    <div class="form-group-mag full-width">
                        <label>Photographs (Multiple possible)</label>
                        <div class="custom-file-upload">
                            <input type="file" id="log-file" accept="image/*" multiple required>
                            <div class="file-dummy">
                                <i class="fas fa-camera"></i>
                                <span class="file-text">사진을 선택해 주세요 (여러 장 가능)</span>
                                <span id="file-count-display" class="selected-files-count hidden"></span>
                            </div>
                        </div>
                    </div>
                </div>

                <div id="upload-status" class="upload-status-mag hidden">
                    <div class="status-anim-bar">
                        <div class="status-anim-progress"></div>
                    </div>
                    <span id="status-text">Uploading to Cloudinary...</span>
                </div>

                <button type="submit" class="magazine-submit-btn" id="submit-log">
                    <span>PUBLISH TO LOG</span>
                </button>
            </form>
        </div>
    </div>

    <!-- Lightbox Modal -->
    <div id="lightbox-modal" class="magazine-lightbox">
        <div class="lightbox-close">&times;</div>
        <div class="lightbox-content">
            <div class="lightbox-image-container">
                <button class="lb-nav lb-prev" id="lb-prev-btn"><i class="fas fa-chevron-left"></i></button>
                <div class="lb-gallery-main">
                    <img id="lb-image" src="" alt="Large View">
                </div>
                <button class="lb-nav lb-next" id="lb-next-btn"><i class="fas fa-chevron-right"></i></button>
                <div class="lb-counter" id="lb-counter">1 / 1</div>
            </div>
            <div class="lightbox-info-panel">
                <div class="lb-header">
                    <span id="lb-date"></span>
                    <h2 id="lb-location"></h2>
                    <div class="lb-line"></div>
                </div>
                <div class="lb-quote-box">
                    <p id="lb-quote"></p>
                </div>
                <div class="lb-details">
                    <div class="lb-detail-item">
                        <span class="label">WITH</span>
                        <span id="lb-companions" class="value"></span>
                    </div>
                    <div class="lb-detail-item">
                        <span class="label">WEATHER</span>
                        <span id="lb-weather" class="value"></span>
                    </div>
                    <div class="lb-detail-item">
                        <span class="label">WRITTEN BY</span>
                        <span id="lb-user" class="value"></span>
                    </div>
                </div>
                <div class="lb-footer">
                    <button class="lb-like-btn" id="lb-like-btn">
                        <i class="far fa-heart"></i> <span id="lb-likes">0</span>
                    </button>
                    <div class="lb-magazine-seal">SNU AI GOLF BOARD</div>
                </div>

                <!--수정 및 삭제 버튼 영역 -->
                <div class="lb-admin-controls hidden" id="lb-admin-controls">
                    <button class="lb-edit-btn" id="lb-edit-btn">EDIT</button>
                    <button class="lb-delete-btn" id="lb-delete-btn">DELETE</button>
                </div>
            </div>
        </div>
    </div>

    <footer class="magazine-footer">
        <p>&copy; 2026 SNU AI Golf Club Editorial. All Rights Reserved.</p>
    </footer>

    <!-- Supabase & Logic Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_CONFIG = {
            url: 'https://qfzmwlyqezmkkxtpscik.supabase.co',
            key: 'sb_publishable_mYejtROOg-2JN7z6_RlWdg_PXYSYgFi'
        };
    </script>
    <script src="script.js?v=4.3"></script>
    <script src="gallery_logic.js?v=2.5"></script>
</body>

</html>
